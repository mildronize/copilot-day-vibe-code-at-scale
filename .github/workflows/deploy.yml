name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main.fix-code

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build \
            --build-arg NEXT_PUBLIC_BETTER_AUTH_URL=${{ vars.BETTER_AUTH_URL }} \
            --build-arg NEXT_PUBLIC_COMMIT_SHA=$SHORT_SHA \
            -t $IMAGE:latest .
          docker push $IMAGE:latest

  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

  # ---------------------------------------------------------------------------
  # Deploy Container App (after build)
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      CONTAINER_APP_REVISION_SUFFIX: gh-actions-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container App with Revision Suffix
        uses: azure/CLI@v1
        with:
          azcliversion: 2.72.0
          inlineScript: |
            IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
            az containerapp update \
              --name ${{ vars.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image $IMAGE:latest \
              --revision-suffix ${{ env.CONTAINER_APP_REVISION_SUFFIX }}

